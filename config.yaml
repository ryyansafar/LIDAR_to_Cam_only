training:
  epochs: 50
  batch_size: 4
  num_workers: 4
  lr: 1.0e-4
  weight_decay: 1.0e-5
  loss_berhu_weight: 1.0
  loss_smooth_weight: 0.1
  loss_l1_weight: 0.5
  valid_depth_min: 1.0
  valid_depth_max: 30.0
  freeze_encoder_epochs: 10
  checkpoint_dir: "checkpoints"
  # Height normalization (will be updated after running precompute_heights.py --stats)
  height_mean: -1.8
  height_std: 0.3

detection:
  pothole_depth_threshold: 0.05   # meters below local plane
  min_pothole_area_px: 500
  local_plane_sigma: 25           # gaussian sigma for local plane estimation
  morph_kernel_size: 7
